[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "munk-plan-agent-runtime-local"
version = "0.1.0"
description = "Local plan runtime implementation for ai-monkey"
requires-python = ">=3.10"
dependencies = [
  "munk-plan-agent-api>=0.1.0",
  "munk-review-agent-api>=0.1.0",
  "munk-shared-api>=0.1.0",
  "munk-shared-tools-api>=0.1.0",
  "pydantic-ai-slim[openai,google]>=1.86.1",
  "httpx>=0.28.1",
  "pyyaml>=6.0.1",
]

[project.optional-dependencies]
test = ["pytest>=8.0.0"]

[project.entry-points."munk.plan.runtimes"]
local = "munk_plan_local:build_plan_runtime_factory"

[tool.uv.sources]
munk-plan-agent-api = { path = "../plan-agent-api", editable = true }
munk-review-agent-api = { path = "../review-agent-api", editable = true }
munk-shared-api = { path = "../../shared/shared-api", editable = true }
munk-shared-tools-api = { path = "../../shared/shared-tools-api", editable = true }

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
