[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "munk-device-android-runtime"
version = "0.1.0"
description = "Android device runtime implementation for munk"
requires-python = ">=3.10"
dependencies = [
  "munk-device-api>=0.1.0",
  "munk-shared-api>=0.1.0",
  "apkutils>=2.0.5",
  "numpy>=1.24.0",
  "uiautomator2>=3.2.5",
]

[project.optional-dependencies]
test = ["pytest>=8.0.0"]

[project.entry-points."munk.device.runtimes"]
android = "munk_device_android:build_device_runtime_factory"

[tool.uv.sources]
munk-device-api = { path = "../device-api", editable = true }
munk-shared-api = { path = "../../shared/shared-api", editable = true }

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
